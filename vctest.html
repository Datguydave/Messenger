<!DOCTYPE html>
<html>
<head>
<title>VC Debug</title>
<style>
body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
video { width: 320px; height: 240px; background: #000; border: 1px solid #444; }
button { margin: 4px; padding: 8px 14px; background: #5865F2; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
#log { background: #1a1a1a; padding: 12px; margin-top: 16px; height: 300px; overflow-y: auto; font-size: 12px; white-space: pre-wrap; border: 1px solid #333; }
.ok  { color: #23a55a; }
.err { color: #ed4245; }
.inf { color: #b5bac1; }
</style>
</head>
<body>
<h2>⚡ Spark — WebRTC Debug</h2>
<p>Open this on TWO browser tabs / devices. One clicks <b>Caller</b>, other clicks <b>Answerer</b>.</p>

<div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:12px">
  <div>
    <div style="margin-bottom:4px;color:#aaa;font-size:11px">LOCAL (you)</div>
    <video id="local-vid" autoplay muted playsinline></video>
  </div>
  <div>
    <div style="margin-bottom:4px;color:#aaa;font-size:11px">REMOTE (other person)</div>
    <video id="remote-vid" autoplay playsinline></video>
    <audio id="remote-aud" autoplay></audio>
  </div>
</div>

<div>
  <button onclick="startCaller()">📞 I am CALLER</button>
  <button onclick="startAnswerer()">📲 I am ANSWERER</button>
  <button onclick="document.getElementById('log').textContent=''">Clear log</button>
</div>

<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyD0VtiBMbVx04EO-Y6DP0YScmTkskaVtko",
  authDomain: "messenger-ac442.firebaseapp.com",
  databaseURL: "https://messenger-ac442-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "messenger-ac442",
});
const db = firebase.database();
const TEST_PATH = "vctest/room1"; // both sides use same path

const ICE = { iceServers: [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "turn:openrelay.metered.ca:80",  username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
  { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
]};

let pc, localStream;

function log(msg, cls="inf") {
  const el = document.getElementById("log");
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = "[" + new Date().toISOString().slice(11,19) + "] " + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function getMedia() {
  log("Requesting mic + camera...");
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    document.getElementById("local-vid").srcObject = localStream;
    log("Got local stream. Tracks: " + localStream.getTracks().map(t=>t.kind+"("+t.label+")").join(", "), "ok");
    return true;
  } catch(e) {
    log("MEDIA ERROR: " + e.message, "err");
    return false;
  }
}

function makePC() {
  pc = new RTCPeerConnection(ICE);
  log("RTCPeerConnection created");

  localStream.getTracks().forEach(t => {
    pc.addTrack(t, localStream);
    log("Added local track: " + t.kind);
  });

  pc.onicecandidate = e => {
    if (!e.candidate) { log("ICE gathering complete"); return; }
    log("ICE candidate: " + e.candidate.candidate.split(" ")[7]);
    db.ref(TEST_PATH + "/ice/" + (window._role) + "/" + Date.now()).set(e.candidate.toJSON());
  };

  pc.oniceconnectionstatechange = () => log("ICE state: " + pc.iceConnectionState, pc.iceConnectionState === "connected" ? "ok" : "inf");
  pc.onconnectionstatechange    = () => log("Conn state: " + pc.connectionState, pc.connectionState === "connected" ? "ok" : "inf");
  pc.onsignalingstatechange     = () => log("Signal state: " + pc.signalingState);
  pc.onicegatheringstatechange  = () => log("Gathering: " + pc.iceGatheringState);

  pc.ontrack = e => {
    log("GOT REMOTE TRACK: " + e.track.kind, "ok");
    const remVid = document.getElementById("remote-vid");
    const remAud = document.getElementById("remote-aud");
    if (e.streams && e.streams[0]) {
      remVid.srcObject = e.streams[0];
      remAud.srcObject = e.streams[0];
      remVid.play().catch(err => log("Video play error: " + err.message, "err"));
      remAud.play().catch(err => log("Audio play error: " + err.message, "err"));
    }
  };
}

// Watch ICE from the OTHER side
function watchIce(fromRole) {
  log("Watching ICE from " + fromRole + "...");
  db.ref(TEST_PATH + "/ice/" + fromRole).on("child_added", async snap => {
    const c = snap.val();
    log("Received ICE from " + fromRole + ": " + (c.candidate||"").split(" ")[7]);
    try {
      if (pc.remoteDescription) {
        await pc.addIceCandidate(new RTCIceCandidate(c));
        log("Added ICE candidate", "ok");
      } else {
        log("Queued ICE (no remote desc yet)");
        window._iceBuf = window._iceBuf || [];
        window._iceBuf.push(c);
      }
    } catch(err) { log("ICE add error: " + err.message, "err"); }
  });
}

async function flushIceBuf() {
  for (const c of (window._iceBuf || [])) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); log("Flushed buffered ICE","ok"); }
    catch(e) { log("Buffered ICE error: " + e.message, "err"); }
  }
  window._iceBuf = [];
}

// ── CALLER ────────────────────────────────────────────────────
async function startCaller() {
  window._role = "caller";
  log("=== CALLER MODE ===", "ok");
  if (!await getMedia()) return;
  await db.ref(TEST_PATH).remove();
  log("Cleared test path");
  makePC();
  watchIce("answerer");

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  log("Offer created, setting local description");
  await db.ref(TEST_PATH + "/offer").set({ type: offer.type, sdp: offer.sdp });
  log("Offer written to Firebase", "ok");

  db.ref(TEST_PATH + "/answer").on("value", async snap => {
    if (!snap.exists() || pc.signalingState !== "have-local-offer") return;
    log("Got answer from Firebase", "ok");
    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
    log("Remote description set (answer)", "ok");
    await flushIceBuf();
  });
}

// ── ANSWERER ──────────────────────────────────────────────────
async function startAnswerer() {
  window._role = "answerer";
  log("=== ANSWERER MODE ===", "ok");
  if (!await getMedia()) return;
  makePC();
  watchIce("caller");

  log("Waiting for offer...");
  db.ref(TEST_PATH + "/offer").on("value", async snap => {
    if (!snap.exists()) return;
    log("Got offer from Firebase", "ok");
    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
    log("Remote description set (offer)", "ok");
    await flushIceBuf();

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    log("Answer created");
    await db.ref(TEST_PATH + "/answer").set({ type: answer.type, sdp: answer.sdp });
    log("Answer written to Firebase", "ok");
  });
}
</script>
</body>
</html>
